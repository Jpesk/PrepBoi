version: '3.8'

services:
  preppro:
    build:
      context: .
      dockerfile: Dockerfile
    image: preppro:v0.1
    container_name: preppro_app
    ports:
      - "8080:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      - "com.preppro.version=0.1"
      - "com.preppro.description=PrepPro Operations & Training Platform"
